<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Podcast Episodes</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    .episode-title { font-weight: 600; }
    .episode-meta { font-size: 0.9rem; }
    .episode-desc { font-size: 0.95rem; }
    .active-episode { border-left: 4px solid var(--bs-primary); }
    .truncate-2 {
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .artwork {
      width: 100%;
      aspect-ratio: 1 / 1;
      object-fit: cover;
      border-radius: 0.75rem;
      background: #f1f3f5;
    }
    code.smallcode { font-size: 0.85rem; }
  </style>
</head>

<body class="bg-light">
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
      <span class="navbar-brand">Engineering Podcast List</span>
      <span class="navbar-text small opacity-75 d-none">RSS → sorted episodes → click to play</span>
    </div>
  </nav>

  <main class="container py-4">
    <div class="row g-4">
      <div class="col-12 col-lg-4">
        <div class="card shadow-sm d-none">
          <div class="card-body">
            <h5 class="card-title mb-3">Feed</h5>

            <label for="feedUrl" class="form-label">RSS feed path / URL</label>
            <div class="input-group mb-2">
              <input id="feedUrl" type="text" class="form-control"
                     value="./feed.xml"
                     placeholder="e.g., ./feed.xml or https://example.com/feed.xml">
              <button id="loadBtn" class="btn btn-primary">Load</button>
            </div>

            <div class="form-text mb-3">
              Same-repo feed? A relative path like <code class="smallcode">./feed.xml</code> works when served over HTTP(S).
            </div>

            <div id="status" class="alert alert-secondary py-2 mb-0" role="alert">Ready.</div>
          </div>
        </div>

        <div class="card shadow-sm mt-0">
          <div class="card-body">
            <h5 class="card-title mb-3">Now Playing</h5>

            <img id="nowPlayingArtwork" class="artwork mb-3 d-none" alt="Episode artwork" />

            <div id="nowPlayingTitle" class="episode-title mb-1 text-truncate">Nothing selected</div>
            <div id="nowPlayingDate" class="episode-meta text-muted mb-3"></div>

            <audio id="audioPlayer" class="w-100" controls preload="none">
              Your browser does not support the audio element.
            </audio>

            <div class="d-flex gap-2 mt-3">
              <button id="playBtn" class="btn btn-success btn-sm" disabled>Play</button>
              <button id="pauseBtn" class="btn btn-outline-secondary btn-sm" disabled>Pause</button>
              <a id="downloadLink" class="btn btn-outline-primary btn-sm disabled" href="#" download>Download</a>
            </div>

            <hr class="my-3" />
            <div id="nowPlayingDesc" class="episode-desc text-muted small"></div>
          </div>
        </div>
      </div>

      <div class="col-12 col-lg-8">
        <div class="card shadow-sm">
          <div class="card-body">
            <div class="d-flex flex-wrap align-items-center justify-content-between gap-2 mb-3">
              <div>
                <h5 class="card-title mb-0">Episodes</h5>
                <div id="feedTitle" class="text-muted small"></div>
              </div>

              <div class="d-flex gap-2">
                <select id="sortOrder" class="form-select form-select-sm" style="width: 190px;">
                  <option value="desc" selected>Newest first</option>
                  <option value="asc">Oldest first</option>
                </select>
                <input id="search" type="search" class="form-control form-control-sm" style="width: 220px;"
                       placeholder="Search title/description">
              </div>
            </div>

            <div id="episodesContainer" class="list-group"></div>
            <div id="emptyState" class="text-center text-muted py-5 d-none">No episodes found.</div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <script>
    // --------- Helpers ---------
    function parseEpisodeDate(dateStr) {
      if (!dateStr) return null;
      const d = new Date(dateStr);
      return isNaN(d.getTime()) ? null : d;
    }

    function resolveUrl(feedUrl, maybeRelativeUrl) {
      try { return new URL(maybeRelativeUrl, feedUrl).toString(); }
      catch { return maybeRelativeUrl; }
    }

    function formatDate(d) {
      if (!d) return "Unknown date";
      return d.toLocaleString(undefined, { year: "numeric", month: "short", day: "2-digit" });
    }

    function sanitizeToText(html) {
      if (!html) return "";
      const $tmp = $("<div>").html(html);
      $tmp.find("script, style, iframe").remove();
      return $tmp.text().trim();
    }

    function setStatus(type, message) {
      const $status = $("#status");
      $status.removeClass().addClass("alert py-2 mb-0 alert-" + (type || "secondary"));
      $status.text(message);
    }

    // Pull an artwork URL from an <item> (episode) node if present.
    // Handles common podcast RSS patterns (iTunes + Media RSS).
    function extractEpisodeArtworkUrl(itemEl) {
      // itunes:image href="..."
      const itunesImage = itemEl.getElementsByTagName("itunes:image")[0];
      const itunesHref = itunesImage?.getAttribute("href");
      if (itunesHref) return itunesHref;

      // media:thumbnail url="..."
      const mediaThumb = itemEl.getElementsByTagName("media:thumbnail")[0];
      const mediaThumbUrl = mediaThumb?.getAttribute("url");
      if (mediaThumbUrl) return mediaThumbUrl;

      // media:content url="..." (sometimes used)
      const mediaContent = itemEl.getElementsByTagName("media:content")[0];
      const mediaContentUrl = mediaContent?.getAttribute("url");
      if (mediaContentUrl) return mediaContentUrl;

      return "";
    }

    // Channel-level fallback artwork (podcast cover art)
    function extractChannelArtworkUrl(xmlDoc) {
      // itunes:image href="..."
      const itunesImage = xmlDoc.querySelector("channel > itunes\\:image");
      const itunesHref = itunesImage?.getAttribute("href");
      if (itunesHref) return itunesHref;

      // <channel><image><url>...</url></image>
      const channelImageUrl = xmlDoc.querySelector("channel > image > url")?.textContent?.trim();
      if (channelImageUrl) return channelImageUrl;

      // Some feeds use media:thumbnail at channel level
      const mediaThumb = xmlDoc.querySelector("channel > media\\:thumbnail");
      const mediaThumbUrl = mediaThumb?.getAttribute("url");
      if (mediaThumbUrl) return mediaThumbUrl;

      return "";
    }

    // --------- State ---------
    let allEpisodes = [];
    let activeGuid = null;
    let channelArtworkUrl = "";

    function setNowPlaying(ep) {
      const player = $("#audioPlayer").get(0);

      if (!ep) {
        activeGuid = null;
        $("#nowPlayingTitle").text("Nothing selected");
        $("#nowPlayingDate").text("");
        $("#nowPlayingDesc").text("");

        $("#nowPlayingArtwork").addClass("d-none").attr("src", "");

        $("#playBtn, #pauseBtn").prop("disabled", true);
        $("#downloadLink").addClass("disabled").attr("href", "#");
        player.removeAttribute("src");
        player.load();

        $(".episode-item").removeClass("active-episode");
        return;
      }

      activeGuid = ep.guid;

      $("#nowPlayingTitle").text(ep.title || "Untitled episode");
      $("#nowPlayingDate").text(formatDate(ep.pubDate));
      $("#nowPlayingDesc").text(ep.descriptionText || "");

      // artwork: episode first, then channel fallback
      const art = ep.artworkUrl || channelArtworkUrl || "";
      if (art) {
        $("#nowPlayingArtwork")
          .removeClass("d-none")
          .attr("src", art)
          .off("error")
          .on("error", function () {
            // If artwork fails to load, hide it (avoids broken image box)
            $(this).addClass("d-none").attr("src", "");
          });
      } else {
        $("#nowPlayingArtwork").addClass("d-none").attr("src", "");
      }

      player.src = ep.audioUrl || "";
      player.load();

      const playable = !!ep.audioUrl;
      $("#playBtn, #pauseBtn").prop("disabled", !playable);

      if (playable) {
        $("#downloadLink")
          .removeClass("disabled")
          .attr("href", ep.audioUrl)
          .attr("download", (ep.title || "episode") + ".mp3");
      } else {
        $("#downloadLink").addClass("disabled").attr("href", "#");
      }

      $(".episode-item").removeClass("active-episode");
      $(`.episode-item[data-guid="${CSS.escape(ep.guid)}"]`).addClass("active-episode");
    }

    function renderEpisodes() {
      const order = $("#sortOrder").val();
      const q = ($("#search").val() || "").toLowerCase().trim();

      let episodes = allEpisodes.slice();

      episodes.sort((a, b) => {
        const at = a.pubDate ? a.pubDate.getTime() : 0;
        const bt = b.pubDate ? b.pubDate.getTime() : 0;
        return order === "asc" ? (at - bt) : (bt - at);
      });

      if (q) {
        episodes = episodes.filter(ep => {
          const hay = ((ep.title || "") + " " + (ep.descriptionText || "")).toLowerCase();
          return hay.includes(q);
        });
      }

      const $container = $("#episodesContainer");
      $container.empty();

      if (!episodes.length) {
        $("#emptyState").removeClass("d-none");
        return;
      }
      $("#emptyState").addClass("d-none");

      for (const ep of episodes) {
        const title = ep.title || "Untitled episode";
        const date = formatDate(ep.pubDate);
        const desc = ep.descriptionText || "";
        const audio = ep.audioUrl || "";

        const disabled = audio ? "" : " disabled";
        const badge = audio ? "" : `<span class="badge text-bg-warning ms-2">No audio</span>`;

        const $item = $(`
          <a href="#" class="list-group-item list-group-item-action episode-item${disabled}"
             data-guid="${String(ep.guid).replaceAll('"','&quot;')}">
            <div class="d-flex w-100 justify-content-between align-items-start">
              <div class="me-3">
                <div class="episode-title">${$("<div>").text(title).html()}${badge}</div>
                <div class="episode-meta text-muted">${$("<div>").text(date).html()}</div>
              </div>
              <button type="button" class="btn btn-sm btn-outline-primary play-episode-btn${disabled}">
                Play
              </button>
            </div>
            <div class="episode-desc text-muted mt-2 truncate-2">${$("<div>").text(desc).html()}</div>
          </a>
        `);

        if (activeGuid && ep.guid === activeGuid) $item.addClass("active-episode");
        $container.append($item);
      }
    }

    async function loadFeed(feedUrl) {
      setStatus("info", "Loading feed…");

      let xmlText;
      try {
        const resp = await fetch(feedUrl, { cache: "no-store" });
        if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
        xmlText = await resp.text();
      } catch (err) {
        setStatus("danger", `Failed to load feed: ${err.message}`);
        return;
      }

      let xml;
      try {
        xml = new DOMParser().parseFromString(xmlText, "text/xml");
        const parseError = xml.querySelector("parsererror");
        if (parseError) throw new Error("Invalid XML in feed.");
      } catch (err) {
        setStatus("danger", `Failed to parse XML: ${err.message}`);
        return;
      }

      $("#feedTitle").text(xml.querySelector("channel > title")?.textContent?.trim() || "");

      // channel artwork fallback
      channelArtworkUrl = extractChannelArtworkUrl(xml);
      if (channelArtworkUrl) channelArtworkUrl = resolveUrl(feedUrl, channelArtworkUrl);

      const items = Array.from(xml.querySelectorAll("item"));

      allEpisodes = items.map((item, idx) => {
        const title = item.querySelector("title")?.textContent?.trim() || "";
        const guidRaw = item.querySelector("guid")?.textContent?.trim();
        const guid = guidRaw || (title + "::" + idx);

        const pubDateRaw =
          item.querySelector("pubDate")?.textContent?.trim() ||
          item.querySelector("published")?.textContent?.trim() ||
          item.querySelector("date")?.textContent?.trim() ||
          "";

        const pubDate = parseEpisodeDate(pubDateRaw);

        const descRaw =
          item.querySelector("description")?.textContent ||
          item.getElementsByTagName("content:encoded")?.[0]?.textContent ||
          "";
        const descriptionText = sanitizeToText(descRaw);

        const enclosure = item.querySelector("enclosure");
        let audioUrl = enclosure?.getAttribute("url") || "";

        const link = item.querySelector("link")?.textContent?.trim() || "";
        if (!audioUrl && /\.(mp3|m4a|aac|ogg|wav)(\?.*)?$/i.test(link)) audioUrl = link;

        if (audioUrl) audioUrl = resolveUrl(feedUrl, audioUrl);

        // episode artwork (resolved against feed URL)
        let artworkUrl = extractEpisodeArtworkUrl(item);
        //alert(artworkUrl)
        if (artworkUrl) artworkUrl = resolveUrl(feedUrl, artworkUrl);

        return { guid, title, pubDateRaw, pubDate, descriptionText, audioUrl, artworkUrl };
      });

      renderEpisodes();
      setStatus("success", `Loaded ${allEpisodes.length} episode(s).`);

      // auto-select first playable episode (or just first)
      const first = allEpisodes.find(ep => ep.audioUrl) || allEpisodes[0];
      if (first) setNowPlaying(first);
    }

    $(function () {
      loadFeed($("#feedUrl").val().trim());

      $("#loadBtn").on("click", function () {
        setNowPlaying(null);
        loadFeed($("#feedUrl").val().trim());
      });

      $("#sortOrder").on("change", renderEpisodes);
      $("#search").on("input", renderEpisodes);

      $("#episodesContainer").on("click", ".episode-item, .play-episode-btn", function (e) {
        e.preventDefault();
        const $item = $(this).closest(".episode-item");
        if ($item.hasClass("disabled")) return;

        const guid = $item.data("guid");
        const ep = allEpisodes.find(x => x.guid === guid);
        if (!ep) return;

        setNowPlaying(ep);

        const player = $("#audioPlayer").get(0);
        if (ep.audioUrl) {
          player.play().catch(() => {});
        }
      });

      $("#playBtn").on("click", function () {
        $("#audioPlayer").get(0).play();
      });

      $("#pauseBtn").on("click", function () {
        $("#audioPlayer").get(0).pause();
      });
    });
  </script>
</body>
</html>
